services:

  # ── Producción ────────────────────────────────────────────────────────────────
  # docker compose up web
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    env_file:
      - path: .env.local
        required: false
    restart: unless-stopped

  # ── Desarrollo (hot reload) ───────────────────────────────────────────────────
  # docker compose --profile dev up web-dev
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - path: .env.local
        required: false
    profiles:
      - dev
